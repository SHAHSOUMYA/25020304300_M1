<!DOCTYPE html>
<html>
<head>
<title>Albums</title>

<style>

body{
    background:#121212;
    color:white;
    font-family:Arial;
    padding:40px;
}

h1{
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

.album-card{
    background:#181818;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
}

.album-card:hover{
    transform:scale(1.03);
}

.album-card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.content{
    padding:20px;
}

.album-btn{
    margin-top:15px;
    background:#1db954;
    border:none;
    color:white;
    padding:10px 20px;
    border-radius:20px;
    cursor:pointer;
}

a{
    text-decoration:none;
}

footer{
    margin-top:50px;
    text-align:center;
    color:gray;
}


.home-btn{
    background:#1db954;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:25px;
    cursor:pointer;
    font-size:16px;
}
</style>

</head>

<body>

<h1>💿 Albums</h1>


<div class="grid">


    <!-- Album 1 -->

    <div class="album-card">

        <img src="https://picsum.photos/400?album1">

        <div class="content">

            <h2>Love Collection</h2>

            <p>Year: 2025</p>

            <p>12 Songs</p>

            <p>⭐ 4.8/5</p>

            <a href="album1.html">

                <button class="album-btn">
                    Open Album
                </button>

            </a>

        </div>

    </div>



    <!-- Album 2 -->

    <div class="album-card">

        <img src="https://picsum.photos/400?album2">

        <div class="content">

            <h2>Chill Vibes</h2>

            <p>Year: 2024</p>

            <p>10 Songs</p>

            <p>⭐ 4.7/5</p>

            <a href="album2.html">

                <button class="album-btn">
                    Open Album
                </button>

            </a>

        </div>

    </div>



    <!-- Album 3 -->

    <div class="album-card">

        <img src="https://picsum.photos/400?album3">

        <div class="content">

            <h2>Party Hits</h2>

            <p>Year: 2025</p>

            <p>15 Songs</p>

            <p>⭐ 4.9/5</p>

            <a href="album3.html">

                <button class="album-btn">
                    Open Album
                </button>

            </a>

        </div>

    </div>



    <!-- Album 4 -->

    <div class="album-card">

        <img src="https://picsum.photos/400?album4">

        <div class="content">

            <h2>Workout Beats</h2>

            <p>Year: 2023</p>

            <p>18 Songs</p>

            <p>⭐ 4.6/5</p>

            <a href="album4.html">

                <button class="album-btn">
                    Open Album
                </button>

            </a>

        </div>

    </div>


</div>

<br><br>

<a href="music.html">

    <button class="home-btn">
        ⬅ Back to Home
    </button>

</a>
<footer>
    © 2026 SoundSphere | All Rights Reserved | Created by Shah Soumya
</footer>

</body>
</html>
